name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web app for GitHub Pages
        run: npm run build -w @app/web
        env:
          GITHUB_PAGES: 'true'
          VITE_DEMO_MODE: 'true'

      - name: Publish to docs folder
        run: |
          rm -rf docs/*
          cp -r apps/web/dist/* docs/
          cp apps/web/dist/index.html docs/404.html
          touch docs/.nojekyll

      - name: Push docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Deploy web app to docs [skip ci]"
          git push
