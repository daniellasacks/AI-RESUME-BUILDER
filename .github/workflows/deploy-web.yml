name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web app for GitHub Pages
        run: npm run build -w @app/web
        env:
          GITHUB_PAGES: 'true'
          VITE_DEMO_MODE: 'true'

      - name: SPA fallback and skip Jekyll on Pages
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          touch apps/web/dist/.nojekyll

      # Deploy to docs/ — works when Pages source is "main /docs"
      - name: Publish build to docs folder
        run: |
          rm -rf docs/*
          cp -r apps/web/dist/* docs/
          cp apps/web/dist/index.html docs/404.html
          touch docs/.nojekyll

      - name: Commit docs folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Deploy web app to docs [skip ci]"
          git push

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy-github-actions:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
